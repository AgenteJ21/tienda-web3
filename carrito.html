<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=<form action="/guardar-producto" method="POST" enctype="multipart/form-data">
    <h2>Agregar Nuevo Producto</h2>
    
    <label for="nombre">Nombre del Producto:</label>
    <input type="text" id="nombre" name="nombre" placeholder="Ej. Camiseta" required>

    <label for="precio">Precio ($):</label>
    <input type="number" id="precio" name="precio" step="0.01" placeholder="0.00" required>

    <label for="stock">Cantidad en Stock:</label>
    <input type="number" id="stock" name="stock" placeholder="0" required>

    <label for="categoria">Categoría:</label>
    <select id="categoria" name="categoria">
        <option value="ropa">Ropa</option>
        <option value="electrónica">Electrónica</option>
        <option value="hogar">Hogar</option>
    </select>

    <label for="imagen">Imagen del Producto:</label>
    <input type="file" id="imagen" name="imagen" accept="image/*">

    <button type="submit">Agregar Producto</button>
</form>
, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
</body>
</html>
